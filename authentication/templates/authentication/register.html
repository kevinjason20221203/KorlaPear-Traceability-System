<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <title>库尔勒香梨溯源系统 - 注册</title> 
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/register.css' %}">

    <style>body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        /*background-color: #C8E6C9;*/
        font-family: Arial, sans-serif;
        background-image: url('/static/images/lmn.jpg');
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
    }
    .form{
        background-color: #FFF8DC;
        padding: 0px;
        height: 600px;
        width: 600px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        border-radius: 10px;
    }
    .error {
        color: red;
        font-size: 14px;
        margin-top: 5px;
      }
    input{
        margin: 15px;
        padding: 15px;
        width: 400px;
        border-radius: 5px;
        border: 1px solid dodgerblue;
    }
    button {
        width: 100%;
        padding: 10px;
        background-color: #45a049;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    button :hover {
    background-color: #45a049;
    color: #fff;
    }
    </style>
</head>  
<body>   
<div class="form"> 
    <h3>用户注册</h3>
    <img src="{% static 'images/logo.png' %}" alt="Logo" width="150" height="90">
    {% if error_message %}
        <p class="error">{{ error_message }}</p>
    {% endif %}
    <form action="" method=POST>
        {% csrf_token %}
        <label for ="username">用户名：</label>
        <input type="text" placeholder="请输入用户名" name='username'required> <br>

        <label for="fullname"> 全名：</label>
        <input type="text" placeholder="请输入您的全名" name='full_name'required> <br>

        <label for="email">电子邮箱：</label>
        <input type="email"placeholder="请输入有效的电子邮箱" name='email'required> <br>

        <label for="password">密码：</label>
        <input type="Password" placeholder="请设置一个强密码" name='password1'required> <br>

        <label for="password">确认密码：</label>
        <input type="Password" placeholder="请再次输入密码" name='password2'required> <br>

        <button type="submit">提交注册</button> <br>

        <p>已有账号？<a href="{% url 'authentication:login' %}">立即登录</a></p>


    </form>
</div>  
</body>  
</html>
