{%extends 'homepage/base.html' %}
{% block content %}
<head>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }
    
      h1 {
        color: #333;
        text-align: center;
      }
    
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
    
      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
      }
    
      th {
        background-color: #4caf50;
        color: white;
      }
    
      tr:nth-child(even) {
        background-color: #f2f2f2;
      }
    
      .update-link,
      .delete-link {
        display: inline-block;
        padding: 5px 10px;
        text-decoration: none;
        color: #fff;
        border-radius: 3px;
        margin-right: 5px;
      }
    
      .update-link {
        background-color: #3498db;
      }
    
      .delete-link {
        background-color: #e74c3c;
      }
    
      .add-button {
        display: inline-block;
        padding: 10px;
        background-color: #4caf50;
        color: white;
        text-decoration: none;
        border-radius: 3px;
        margin-top: 20px;
      }
    
      .expenses-link {
        display: inline-block;
        padding: 5px 10px;
        margin: 5px;
        text-align: center;
        text-decoration: none;
        border: 2px solid #3498db;
        color: #3498db;
        border-radius: 5px;
        transition: background-color 0.3s, color 0.3s;
      }
      
      .expenses-link:hover {
        background-color: #3498db;
        color: #fff;
      }
          
    </style>
</head>
<body>
    <h1>采摘批次详情</h1>
    <table>
        <thead>
            <tr>
                <th>批次编号/耳标</th>
                <th>种类</th>
                <th>存续时长</th>
                <th>品种/来源</th>
                <th>更多详情</th>
                <th>二维码管理</th>
                <th>管理操作</th>
            </tr>
        </thead>
        <tbody>
            {% for batch in livestock %}
            <tr>
                <td>{{ batch.Tag_number }}</td>
                <td>{{ batch.Animal_type }}</td>
                <td>{{ batch.Age }}</td>
                <td>{{ batch.Breed }}</td>

                <td>  <a href="{% url 'homepage:show-livestockproduction' Tag_number=batch.Tag_number %}" class="expenses-link">生产记录</a></td>

                <td>
                  <a href="{% url 'homepage:qrcode-management' Tag_number=batch.Tag_number %}" class="expenses-link" style="background-color: #4CAF50; color: white; border-color: #4CAF50;">二维码管理</a>
                  <a href="{% url 'homepage:generate-qrcode-for-livestock' Tag_number=batch.Tag_number %}" class="expenses-link" style="background-color: #2196F3; color: white; border-color: #2196F3;">生成二维码</a>
                </td>

                <td><a href="{% url 'homepage:update-livestock' Tag_number=batch.Tag_number %}" class="update-link">编辑</a>
                 
                  <a href="{% url 'homepage:delete-livestock' Tag_number=batch.Tag_number %}"class="delete-link">删除</a> </td>

            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'homepage:add-livestock' %}" class="add-button">新增记录</a>
</body>
{%endblock%}
