{%extends 'homepage/base.html' %} {% block content %}
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    h1 {
      color: #333;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #4caf50;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    .update-link,
    .delete-link {
      display: inline-block;
      padding: 5px 10px;
      text-decoration: none;
      color: #fff;
      border-radius: 3px;
      margin-right: 5px;
    }

    .update-link {
      background-color: #3498db;
    }

    .delete-link {
      background-color: #e74c3c;
    }

    .add-button {
      display: inline-block;
      padding: 10px;
      background-color: #4caf50;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>采摘生产记录详情</h1>
  <table>
    <thead>
      <tr>
        <th>生产日期</th>
        <th>生产数量</th>
        <th>消耗饲料(kg)</th>
        <th>备注</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for production in productions %}
      <tr>
        <td>{{ production.Production_date }}</td>
        <td>{{ production.Production_amount }}</td>
        <td>{{ production.Feed_consumed }}</td>
        <td>{{ production.Comments }}</td>

        <td>
          <a
            href="{% url 'homepage:update-livestockproduction' Tag_number=livestock.Tag_number Production_date=production.Production_date|date:'Y-m-d' %}"
            class="update-link"
            >更新</a
          >
          <a
            href="{% url 'homepage:delete-livestockproduction' Tag_number=livestock.Tag_number Production_date=production.Production_date|date:'Y-m-d' %}"
            class="delete-link"
            >删除</a
          >
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <a
    href="{% url 'homepage:add-livestockproduction' Tag_number=livestock.Tag_number %}"
    class="add-button"
    >添加生产记录</a
  >
</body>
{%endblock%}
