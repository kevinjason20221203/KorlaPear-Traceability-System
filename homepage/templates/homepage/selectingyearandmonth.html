{%extends 'homepage/base.html' %}
{% block content %}
<head>
    <title>生产数据回溯查询</title>
    <style>
        body {

            margin: 0;
            background-color: #f4f4f4;
        }

        .card {
            width: 300px;
            margin: 100px auto; /* Adjust the margin as needed to control the vertical position */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            text-align: center;
        }

        h1 {
            color: #333333;
        }

        select, button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        select {
            font-size: 16px;
        }

        button {
            background-color: #4caf50;
            color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>生产数据回溯查询</h1>
        <form method="post" action="{% url 'homepage:select-yearandmonth' %}">
            {% csrf_token %}
            <select id="Year" name="Year" style="direction: ltr; overflow: auto;">
                {% now "Y" as current_year %}
                <option value="2020" {% if current_year == "2020" %}selected{% endif %}>2020</option>
                <option value="2021" {% if current_year == "2021" %}selected{% endif %}>2021</option>
                <option value="2022" {% if current_year == "2022" %}selected{% endif %}>2022</option>
                <option value="2024" {% if current_year == "2024" %}selected{% endif %}>2024</option>
                <option value="2025" {% if current_year == "2025" %}selected{% endif %}>2025</option>
                <option value="2026" {% if current_year == "2026" %}selected{% endif %}>2026</option>
                <option value="2027" {% if current_year == "2027" %}selected{% endif %}>2027</option>
                <option value="2028" {% if current_year == "2028" %}selected{% endif %}>2028</option>
                <option value="2029" {% if current_year == "2029" %}selected{% endif %}>2029</option>
                <option value="2030" {% if current_year == "2030" %}selected{% endif %}>2030</option>
                <option value="2031" {% if current_year == "2031" %}selected{% endif %}>2031</option>
            </select>
            <select id="Month" name="Month" style="direction: ltr; overflow: auto;">
                {% now "m" as current_month %}
                <option value="01" {% if current_month == "01" %}selected{% endif %}>01月</option>
                <option value="02" {% if current_month == "02" %}selected{% endif %}>02月</option>
                <option value="03" {% if current_month == "03" %}selected{% endif %}>03月</option>
                <option value="04" {% if current_month == "04" %}selected{% endif %}>04月</option>
                <option value="05" {% if current_month == "05" %}selected{% endif %}>05月</option>
                <option value="06" {% if current_month == "06" %}selected{% endif %}>06月</option>
                <option value="07" {% if current_month == "07" %}selected{% endif %}>07月</option>
                <option value="08" {% if current_month == "08" %}selected{% endif %}>08月</option>
                <option value="09" {% if current_month == "09" %}selected{% endif %}>09月</option>
                <option value="10" {% if current_month == "10" %}selected{% endif %}>10月</option>
                <option value="11" {% if current_month == "11" %}selected{% endif %}>11月</option>
                <option value="12" {% if current_month == "12" %}selected{% endif %}>12月</option>
            </select>
            <button type="submit">显示查询结果</button>
        </form>
    </div>
</body>
{%endblock%}
